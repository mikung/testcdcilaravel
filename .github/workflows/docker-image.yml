name: Build and Push to Docker Hub

on:
  push:
    branches:
      - main # รันเมื่อมีการ Push เข้า Branch main

jobs:
  docker:
    runs-on: ubuntu-latest # ใช้ Runner ของ GitHub (Cloud) เพื่อประหยัด CPU เครื่องเรา
    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: 🔑 Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: 🛠️ Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        # ช่วยให้ Build Image ได้เร็วขึ้นและรองรับหลายสถาปัตยกรรม (เช่น x86, ARM)

      - name: 🏗️ Build and Push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          # เปลี่ยน 'your-username' เป็นชื่อคุณ และ 'your-app-name' เป็นชื่อโปรเจกต์
          platforms: linux/amd64
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/your-app-name:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/your-app-name:${{ github.sha }}
