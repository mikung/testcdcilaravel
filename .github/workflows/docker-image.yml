name: Build and Push to Docker Hub

on:
  push:
    branches:
      - main # รันเมื่อมีการ Push เข้า Branch main

jobs:
  docker:
    runs-on: ubuntu-latest # ใช้ Runner ของ GitHub (Cloud) เพื่อประหยัด CPU เครื่องเรา
    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: 🐳 Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: 🛠️ Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 🔑 Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: 🏗️ Build and Push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          # ต้องระบุทั้งสองอย่าง เพื่อให้รันได้ทั้งบน Server (amd64) และบน Mac (arm64)
          platforms: linux/amd64,linux/arm64
          tags: mikung555/your-app-name:latest
