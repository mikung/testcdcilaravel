openapi: 3.0.0
info:
  title: MedBank API
  description: ระบบจัดการการจัดส่งยาและคิวนัดหมายสำหรับเภสัชกรและผู้ป่วย
  version: 1.0.0
servers:
  - url: http://localhost:8000/api
    description: Local server
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT # หรือ Sanctum token

security:
  - bearerAuth: []

paths:
  # ==========================================
  # Public Routes (ฝั่งผู้ป่วย)
  # ==========================================
  /medbank/patient/{vn}:
    get:
      tags:
        - Patient (Public)
      summary: ดึงข้อมูลการนัดหมายและคิวของผู้ป่วย
      security: []
      parameters:
        - name: vn
          in: path
          required: true
          schema:
            type: string
          description: รหัส VN (12 หลัก)
        - name: hn
          in: query
          required: true
          schema:
            type: string
          description: รหัส HN สำหรับยืนยันตัวตน
      responses:
        '200':
          description: สำเร็จ
        '404':
          description: ไม่พบข้อมูล (VN หรือ HN ไม่ถูกต้อง)

  /medbank/notify:
    post:
      tags:
        - Patient (Public)
      summary: แจ้งความประสงค์รับยา (ส่งไปรษณีย์/รับเอง)
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - vn
                - delivery_method
              properties:
                vn:
                  type: string
                  example: "123456789012"
                delivery_method:
                  type: string
                  enum: [pickup, delivery]
                address:
                  type: string
                  description: "จำเป็นหากเลือก delivery"
                phone:
                  type: string
                  example: "0812345678"
                  description: "จำเป็นหากเลือก delivery"
      responses:
        '201':
          description: บันทึกข้อมูลสำเร็จ
        '409':
          description: มีการแจ้งความประสงค์ไปแล้ว

  # ==========================================
  # Authentication
  # ==========================================
  /medbank/auth/login:
    post:
      tags:
        - Auth
      summary: เข้าสู่ระบบสำหรับเจ้าหน้าที่
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - username
                - password
              properties:
                username:
                  type: string
                password:
                  type: string
      responses:
        '200':
          description: เข้าสู่ระบบสำเร็จ ได้รับ Token
        '401':
          description: Username หรือ Password ไม่ถูกต้อง
        '403':
          description: บัญชียังไม่ได้รับการอนุมัติ (Not active)

  /medbank/auth/register:
    post:
      tags:
        - Auth
      summary: ลงทะเบียนบัญชีใหม่สำหรับเจ้าหน้าที่
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - username
                - name
                - password
              properties:
                username:
                  type: string
                name:
                  type: string
                password:
                  type: string
                  minLength: 8
                role:
                  type: string
                  enum: [pharmacist, staff]
      responses:
        '201':
          description: ลงทะเบียนสำเร็จ รอการอนุมัติ

  /medbank/auth/logout:
    post:
      tags:
        - Auth
      summary: ออกจากระบบ
      responses:
        '200':
          description: ออกจากระบบสำเร็จ

  # ==========================================
  # Pharmacist Protected Routes
  # ==========================================
  /medbank/patients/search:
    get:
      tags:
        - Pharmacist Operations
      summary: ค้นหาผู้ป่วยด้วย HN หรือชื่อ
      parameters:
        - name: q
          in: query
          required: false
          schema:
            type: string
          description: คำค้นหา (อย่างน้อย 2 ตัวอักษร)
      responses:
        '200':
          description: รายชื่อผู้ป่วยที่ตรงกับการค้นหา

  /medbank/queue:
    get:
      tags:
        - Pharmacist Operations
      summary: ดึงรายการแจ้งความประสงค์ (คิวงานจัดยา)
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [pending, processing, dispatched, completed]
        - name: search
          in: query
          schema:
            type: string
          description: ค้นหาด้วย HN หรือชื่อ
      responses:
        '200':
          description: รายการแจ้งความประสงค์

  /medbank/queue/{id}/status:
    patch:
      tags:
        - Pharmacist Operations
      summary: อัปเดตสถานะคิวงานจัดส่งยา
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - status
              properties:
                status:
                  type: string
                  enum: [processing, dispatched, completed]
      responses:
        '200':
          description: อัปเดตสถานะสำเร็จ
        '422':
          description: สถานะไม่สามารถเปลี่ยนได้ (Transition error)

  /medbank/import:
    post:
      tags:
        - Pharmacist Operations
      summary: นำเข้าไฟล์คิวนัดหมายผู้ป่วย (CSV)
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
                  description: ไฟล์ CSV ข้อมูลผู้ป่วย (ขนาดไม่เกิน 5MB)
      responses:
        '200':
          description: นำเข้าข้อมูลสำเร็จ (แสดงสถิติ)
        '422':
          description: ข้อมูลในไฟล์ไม่ถูกต้อง

  # ==========================================
  # Admin Protected Routes
  # ==========================================
  /medbank/accounts/pending:
    get:
      tags:
        - Admin Operations
      summary: ดึงรายชื่อบัญชีเจ้าหน้าที่ที่รอการอนุมัติ
      responses:
        '200':
          description: สำเร็จ

  /medbank/accounts/{id}/approve:
    post:
      tags:
        - Admin Operations
      summary: อนุมัติบัญชีผู้ใช้งาน
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                role:
                  type: string
                  enum: [pharmacist, staff]
      responses:
        '200':
          description: อนุมัติสำเร็จ

  /medbank/accounts/{id}/reject:
    post:
      tags:
        - Admin Operations
      summary: ปฏิเสธ/ไม่อนุมัติบัญชีผู้ใช้งาน
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: ปฏิเสธสำเร็จ
