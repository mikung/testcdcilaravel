services:

  # ห้องที่ 1: PHP (รันโค้ด Laravel)
  app:
    build: .
    container_name: laravel_app
    restart: unless-stopped
    env_file: .env
    volumes:
      - .:/var/www
      - vendor_data:/var/www/vendor
    networks:
      - laravel_net

  # ห้องที่ 2: Nginx (Web Server)
  nginx:
    image: nginx:alpine
    container_name: laravel_nginx
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - .:/var/www
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - laravel_net

networks:
  laravel_net:

volumes:
  db_data:
  vendor_data:
